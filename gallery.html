<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Naples Waves</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gallery Layout Styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery-item {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-weight: 600;
            transition: transform 0.2s, border-color 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: #3b82f6;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Naples Waves</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="roster.html">Roster</a></li>
                    <li><a href="tickets.html">Tickets</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="content-section">
        <h1 class="page-title">Photo Gallery</h1>
        
        <div class="gallery-grid">
            <div class="gallery-item"><span>[ Week 1 Photo ]</span></div>
            <div class="gallery-item"><span>[ Week 2 Photo ]</span></div>
            <div class="gallery-item"><span>[ Practice Photo ]</span></div>
            <div class="gallery-item"><span>[ Team Photo ]</span></div>
        </div>
    </div>

</body>
</html>
