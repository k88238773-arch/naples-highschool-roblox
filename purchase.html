<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naples High School Football - Order Complete</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ticket-box {
            background-color: #0b111e;
            border: 2px dashed #3b82f6;
            border-radius: 12px;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            text-align: center;
        }
        .ticket-number {
            font-size: 32px;
            font-weight: 800;
            color: #3b82f6;
            letter-spacing: 2px;
            margin: 20px 0;
            padding: 10px;
            background-color: #0f172a;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">Naples High School</div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="schedule.html">Schedule</a>
                <a href="roster.html">Roster</a>
                <a href="tickets.html" class="active">Tickets</a>
                <a href="news.html">News</a>
                <a href="gallery.html">Gallery</a>
            </nav>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="roster-section">
            <h1 class="page-title">Purchase Successful!</h1>
            <p class="page-subtitle">Thank you for supporting Naples Wave Football</p>
            
            <div class="ticket-box">
                <h2 style="font-size: 20px; text-transform: uppercase; letter-spacing: 1px;">Admission Ticket</h2>
                <p style="color: #94a3b8; margin-top: 5px;">Week 1 vs. Curtis Warrior</p>
                
                <div class="ticket-number" id="ticketId">LOADING...</div>
                
                <p style="font-size: 14px; color: #cbd5e1;">Please save or screenshot this page for stadium entry.</p>
                <a href="index.html" class="hero-btn" style="margin-top: 25px; padding: 10px 24px; font-size: 14px;">Return Home</a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Generates a random number between 100000 and 999999
            const randomNumber = Math.floor(100000 + Math.random() * 900000);
            document.getElementById("ticketId").textContent = "NPHS-" + randomNumber;
        });
    </script>

</body>
</html>
